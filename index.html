<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tweeter</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="navbar">
<img src="images/tweeter.png" class="logo">
</div>

<div class="main">

<div class="tweet-box">

<div class="profile-pic"></div>

<div class="tweet-input">
<textarea id="tweetText" placeholder="What's happening?"></textarea>

<p id="charLabel">160 characters remaining</p>

<button id="tweetBtn">tweeet</button>
</div>

</div>

<div class="tweet">

<div class="profile-pic"></div>

<div class="tweet-content">

<p>
<strong>Sean Solis</strong>
<span class="tweet-meta">@seansolis - Feb 25, 2026</span>
</p>

<p>
Wassup brochachos
</p>

<div class="tweet-actions">
  <span>
    <img src="images/comment.png" class="action-icon"> 1
  </span>

  <span>
    <img src="images/retweet.png" class="action-icon"> 0
  </span>

  <span>
    <img src="images/like.png" class="action-icon"> 8
  </span>

  <span>
    <img src="images/upload.png" class="action-icon"> 0
  </span>
</div>

<script src="js/script.js"></script>

</body>
</html>
